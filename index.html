<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram &amp; Data Science — Rudraksh Dubey</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap');

  :root {
    --bg:#fff;--bg2:#fafafa;--card:#fff;--text:#262626;--text2:#8e8e8e;
    --border:#efefef;--accent:#0095f6;--heart:#ed4956;--nav:#ffffffee;
    --tag-bg:#e8f0fe;--tag-text:#1a73e8;--glass:rgba(255,255,255,.06);
  }
  .dark {
    --bg:#000;--bg2:#0a0a0a;--card:#111;--text:#f5f5f5;--text2:#888;
    --border:#222;--nav:#000000ee;--tag-bg:#1e3a5f;--tag-text:#7cb9f7;
    --glass:rgba(255,255,255,.04);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg2);color:var(--text);
    display:flex;justify-content:center;min-height:100vh;transition:all .35s;
  }

  /* PHONE */
  .phone{
    width:100%;max-width:440px;min-height:100vh;background:var(--bg);
    position:relative;display:flex;flex-direction:column;
    box-shadow:0 0 80px rgba(0,0,0,.06);overflow:hidden;transition:all .35s;
  }

  /* NAV */
  .topnav{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;background:var(--nav);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:100;transition:all .35s;
  }
  .ig-logo{
    font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:800;
    font-style:italic;
    background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .nav-r{display:flex;gap:14px;align-items:center}
  .nav-r button{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center}
  .nav-r svg{width:24px;height:24px;fill:var(--text);transition:fill .3s}
  .counter{
    font-size:11px;font-weight:700;color:#fff;
    background:linear-gradient(135deg,#833ab4,#dc2743,#fcb045);
    padding:4px 12px;border-radius:14px;
    box-shadow:0 2px 8px rgba(220,39,67,.3);
  }

  /* PROGRESS */
  .prog-wrap{height:3px;background:var(--border);position:sticky;top:60px;z-index:99;transition:background .3s}
  .prog-fill{height:100%;border-radius:0 3px 3px 0;background:linear-gradient(90deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);transition:width .5s cubic-bezier(.4,0,.2,1)}

  /* FEED */
  .feed{flex:1;overflow-y:auto;padding-bottom:80px;scroll-behavior:smooth}
  .feed::-webkit-scrollbar{width:0}

  /* POST */
  .post{
    background:var(--card);border-bottom:1px solid var(--border);
    transition:all .35s;
    opacity:0;transform:translateY(60px) scale(.97);
    transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.4,0,.2,1);
  }
  .post.visible{opacity:1;transform:translateY(0) scale(1)}
  .post-head{display:flex;align-items:center;padding:14px 18px;gap:12px}
  .post-av{
    width:40px;height:40px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;color:#fff;flex-shrink:0;
    box-shadow:0 3px 12px rgba(0,0,0,.15);
  }
  .post-info{flex:1}
  .post-user{font-weight:700;font-size:14px;letter-spacing:-.2px}
  .post-sub{font-size:11px;color:var(--text2);margin-top:1px}
  .post-badge{
    font-size:10px;font-weight:800;letter-spacing:.8px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:#fff;padding:4px 12px;border-radius:12px;text-transform:uppercase;
    box-shadow:0 2px 8px rgba(118,75,162,.3);
  }

  /* SLIDE */
  .slide{
    width:100%;aspect-ratio:4/5;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:36px 26px;position:relative;overflow:hidden;
  }
  .slide>*{position:relative;z-index:3}
  /* Animated mesh gradient overlay */
  .slide::before{
    content:'';position:absolute;inset:-50%;width:200%;height:200%;
    background:radial-gradient(circle at 20% 30%,rgba(255,255,255,.08) 0%,transparent 50%),
               radial-gradient(circle at 80% 70%,rgba(255,255,255,.05) 0%,transparent 40%),
               radial-gradient(circle at 50% 50%,rgba(255,255,255,.03) 0%,transparent 60%);
    animation:meshFloat 12s ease-in-out infinite;z-index:1;
  }
  @keyframes meshFloat{
    0%,100%{transform:translate(0,0) rotate(0deg)}
    33%{transform:translate(3%,-3%) rotate(1deg)}
    66%{transform:translate(-2%,2%) rotate(-1deg)}
  }
  /* Floating particles */
  .slide::after{
    content:'';position:absolute;inset:0;z-index:2;
    background-image:
      radial-gradient(1.5px 1.5px at 10% 20%,rgba(255,255,255,.25),transparent),
      radial-gradient(1px 1px at 30% 60%,rgba(255,255,255,.15),transparent),
      radial-gradient(1.5px 1.5px at 50% 10%,rgba(255,255,255,.2),transparent),
      radial-gradient(1px 1px at 70% 80%,rgba(255,255,255,.12),transparent),
      radial-gradient(1.5px 1.5px at 90% 40%,rgba(255,255,255,.18),transparent),
      radial-gradient(1px 1px at 15% 85%,rgba(255,255,255,.1),transparent),
      radial-gradient(1.5px 1.5px at 85% 15%,rgba(255,255,255,.15),transparent),
      radial-gradient(1px 1px at 60% 45%,rgba(255,255,255,.08),transparent);
    animation:sparkle 8s ease-in-out infinite alternate;
  }
  @keyframes sparkle{0%{opacity:.6}100%{opacity:1}}

  /* Slide number watermark */
  .slide-num{
    position:absolute;top:18px;right:20px;
    font-size:72px;font-weight:900;color:rgba(255,255,255,.06);
    font-family:'Playfair Display',serif;line-height:1;z-index:2;
    letter-spacing:-3px;
  }

  /* Typography */
  .slide .icon{font-size:52px;margin-bottom:12px;filter:drop-shadow(0 6px 20px rgba(0,0,0,.35))}
  .slide .title{
    font-family:'Playfair Display',Georgia,serif;
    font-size:28px;font-weight:800;color:#fff;text-align:center;
    margin-bottom:6px;text-shadow:0 3px 16px rgba(0,0,0,.35);line-height:1.15;
    letter-spacing:-.5px;
  }
  .slide .sub{
    font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:3px;color:rgba(255,255,255,.5);margin-bottom:20px;
  }
  .slide .body{font-size:14px;line-height:1.7;color:rgba(255,255,255,.88);text-align:center;max-width:360px}
  .slide .body strong{color:#fff}

  /* GLASS CARD */
  .gc{
    background:rgba(255,255,255,.08);backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.1);border-radius:18px;
    padding:18px 20px;width:100%;max-width:360px;
    margin:6px 0;text-align:left;color:rgba(255,255,255,.9);
    transition:transform .2s;
  }
  .gc:hover{transform:translateY(-2px)}
  .gc h4{font-size:15px;font-weight:700;margin-bottom:8px;color:#fff}
  .gc p,.gc li{font-size:13px;line-height:1.65;color:rgba(255,255,255,.82)}
  .gc ul{list-style:none;padding:0}
  .gc ul li{padding:4px 0 4px 20px;position:relative}
  .gc ul li::before{
    content:'';position:absolute;left:0;top:12px;
    width:8px;height:8px;border-radius:50%;
    background:linear-gradient(135deg,rgba(255,255,255,.5),rgba(255,255,255,.2));
  }

  /* CODE */
  .cb{
    background:rgba(0,0,0,.45);backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);border-radius:14px;
    padding:16px 18px;font-family:'SF Mono','Fira Code','Consolas',monospace;
    font-size:12px;color:#e0e0e0;text-align:left;
    width:100%;max-width:360px;margin:8px 0;line-height:1.65;white-space:pre-wrap;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  }
  .cb .kw{color:#c792ea}.cb .fn{color:#82aaff}.cb .str{color:#c3e88d}.cb .cmt{color:#546e7a}.cb .num{color:#f78c6c}

  /* STAT GRID */
  .sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:360px;margin:10px 0}
  .sb{
    background:rgba(255,255,255,.08);backdrop-filter:blur(10px);
    border-radius:16px;padding:18px 12px;text-align:center;
    border:1px solid rgba(255,255,255,.06);
    transition:transform .2s;
  }
  .sb:hover{transform:translateY(-2px)}
  .sb .n{font-size:32px;font-weight:900;line-height:1.1;font-family:'Playfair Display',serif}
  .sb .l{font-size:11px;color:rgba(255,255,255,.55);margin-top:6px;line-height:1.3}

  /* ALERT CARD */
  .ac{border-radius:0 16px 16px 0;padding:16px 18px;text-align:left;width:100%;max-width:360px;margin:5px 0;transition:transform .2s}
  .ac:hover{transform:translateX(4px)}
  .ac h5{font-size:14px;font-weight:700;color:#fff;margin-bottom:5px}
  .ac p{font-size:12px;color:rgba(255,255,255,.78);line-height:1.55}

  /* TAGS */
  .tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0;max-width:360px}
  .tag{
    background:rgba(255,255,255,.12);backdrop-filter:blur(6px);
    padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;
    border:1px solid rgba(255,255,255,.08);transition:transform .15s,background .15s;
  }
  .tag:hover{transform:scale(1.05);background:rgba(255,255,255,.18)}

  /* TEAM CARD */
  .tc{
    background:rgba(255,255,255,.1);backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.12);border-radius:24px;
    padding:28px 24px;text-align:center;width:220px;
    box-shadow:0 8px 32px rgba(0,0,0,.15);
  }
  .tc .av{
    width:72px;height:72px;border-radius:50%;margin:0 auto 12px;
    display:flex;align-items:center;justify-content:center;
    font-size:30px;font-weight:900;color:#fff;
    box-shadow:0 4px 20px rgba(0,0,0,.2);
  }
  .tc .nm{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px}
  .tc .rl{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px;letter-spacing:.5px}

  /* FLOW STEPS */
  .fs{display:flex;align-items:flex-start;gap:14px;width:100%;max-width:360px;margin:5px 0;color:rgba(255,255,255,.9)}
  .fn2{
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:800;flex-shrink:0;color:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  .ft{font-size:13px;line-height:1.55;padding-top:4px}
  .ft strong{color:#fff}

  /* POST FOOTER */
  .post-actions{display:flex;align-items:center;padding:12px 18px 8px;gap:18px}
  .post-actions svg{
    width:26px;height:26px;cursor:pointer;transition:transform .15s;
    fill:none;stroke:var(--text);stroke-width:1.8;
  }
  .post-actions svg:hover{transform:scale(1.2)}
  .post-actions svg.liked{fill:var(--heart);stroke:var(--heart)}
  .post-actions .sp{flex:1}
  .likes{padding:2px 18px 4px;font-weight:800;font-size:14px;letter-spacing:-.2px}
  .caption{padding:2px 18px 16px;font-size:13px;line-height:1.6;color:var(--text2)}
  .caption b{color:var(--text);font-weight:700}
  .caption .ht{color:var(--accent)}

  /* BOTTOM NAV */
  .botnav{
    display:flex;align-items:center;justify-content:space-around;
    padding:12px 0 28px;background:var(--nav);backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    position:fixed;bottom:0;width:100%;max-width:440px;z-index:100;transition:all .35s;
  }
  .botnav svg{width:24px;height:24px;fill:var(--text);transition:fill .3s}
  .botnav-av{
    width:28px;height:28px;border-radius:50%;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:900;color:#fff;
    box-shadow:0 2px 8px rgba(118,75,162,.3);
  }

  /* ANIMATIONS */
  .dbl-heart{position:absolute;font-size:90px;z-index:50;pointer-events:none;animation:hb .9s ease-out forwards}
  @keyframes hb{0%{opacity:1;transform:scale(.3) rotate(-15deg)}25%{opacity:1;transform:scale(1.2) rotate(5deg)}100%{opacity:0;transform:scale(1.4) translateY(-30px) rotate(0deg)}}
  @keyframes hp{0%{transform:scale(1)}50%{transform:scale(1.35)}100%{transform:scale(1)}}
  .heart-pop{animation:hp .35s cubic-bezier(.4,0,.2,1)}

  /* DIVIDER between posts */
  .post-divider{
    height:8px;background:var(--bg2);transition:background .35s;
  }

  @media(max-width:440px){
    .phone{box-shadow:none}
    .slide{padding:28px 18px}
    .slide .title{font-size:24px}
    .slide-num{font-size:56px}
  }
</style>
</head>

const S=[

      <div class="sub">What We'll Cover</div>

  {u:"ml_architecture",s:"Model Architecture Details",b:"DEEP DIVE",
   abg:"linear-gradient(135deg,#a18cd1,#fbc2eb)",av:"⚙️",
   bg:"linear-gradient(135deg,#1a002e,#3a0066 50%,#1a0033)",
   lk:"45,123",
   cap:`<b>ml_architecture</b> Two-Tower architecture: encode users & items into shared embedding space. Dot product = relevance score. Retrained daily. <span class="ht">#DeepLearning #TwoTower</span>`,
   h:`<div class="slide-num">12</div>
      <div class="icon">⚙️</div>
      <div class="title">Model Architecture</div>
      <div class="sub">Two-Tower Deep Learning</div>
      <div class="gc"><h4>🏗️ Two-Tower Architecture</h4>
        <p><strong>User Tower:</strong> History, preferences, demographics → 256-dim embedding</p>
        <p style="margin-top:6px"><strong>Item Tower:</strong> Image vector, caption, hashtags, stats → 256-dim embedding</p>
        <p style="margin-top:6px"><strong>Score:</strong> Dot product = predicted engagement probability</p>
      </div>
      <div class="cb" style="font-size:11px;margin-top:8px"><span class="cmt"># Simplified model</span>
<span class="kw">class</span> <span class="fn">Recommender</span>(nn.Module):
  <span class="kw">def</span> <span class="fn">forward</span>(self, user, item):
    u = self.user_tower(user)   <span class="cmt"># 256-d</span>
    i = self.item_tower(item)   <span class="cmt"># 256-d</span>
    <span class="kw">return</span> sigmoid(dot(u, i))   <span class="cmt"># P(engage)</span></div>
      <div class="gc" style="margin-top:8px"><h4>Training at Scale</h4>
        <ul><li><strong>Data:</strong> Billions of interactions</li>
        <li><strong>Loss:</strong> Binary cross-entropy</li>
        <li><strong>Refresh:</strong> Retrained daily</li>
        <li><strong>Hardware:</strong> Custom Meta MTIA chips</li></ul>
      </div>`},

   cap:`<b>datagram_official</b> Thank you for scrolling through! This entire experience was built as an Instagram UI — because when you study an app, why not <i>become</i> the app? <span class="ht">#ThankYou #FT3 #CreativePresentation</span>`,
   h:`<div class="slide-num" style="font-size:80px;color:rgba(255,255,255,.04)">FIN</div>
      <div class="icon" style="font-size:68px">🙏</div>
      <div class="title" style="font-size:38px">Thank You!</div>
      <div class="sub" style="margin-top:8px">For Scrolling Through</div>
      <div style="margin-top:24px">
        <div class="tc">
          <div class="av" style="background:linear-gradient(135deg,#667eea,#764ba2)">RD</div>
          <div class="nm">Rudraksh Dubey</div>
          <div class="rl" style="margin-top:6px;font-weight:600">RA2311004010282</div>
        </div>
      </div>
      <div class="gc" style="margin-top:24px;text-align:center"><h4>Key Takeaway</h4><p>Every feature on Instagram — Feed, Explore, Reels — is powered by Data Science. The algorithm isn't just a feature; <strong>it IS the product</strong>.</p></div>
      <div style="margin-top:20px;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-align:center;font-weight:500">FT3 ACTIVITY &bull; DATA SCIENCE</div>`},
];

const N=S.length;
let dark=false,liked=new Set();

function build(){
  const f=document.getElementById('feed');
  f.innerHTML=S.map((s,i)=>`
    <div class="post" data-idx="${i}" id="p${i}">
      <div class="post-head">
        <div class="post-av" style="background:${s.abg}">${s.av}</div>
        <div class="post-info"><div class="post-user">${s.u}</div><div class="post-sub">${s.s}</div></div>
        <div class="post-badge">${s.b}</div>
      </div>
      <div class="slide" style="background:${s.bg}" ondblclick="dbl(event,${i})">${s.h}</div>
      <div class="post-actions">
        <svg id="h${i}" onclick="lk(${i})" viewBox="0 0 24 24"><path d="M16.792 3.904A4.989 4.989 0 0121.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-1.834-1.543-4.303-3.752C5.141 14.072 2.5 12.167 2.5 9.122a4.989 4.989 0 014.708-5.218 4.21 4.21 0 013.675 1.941c.84 1.175.98 1.763 1.12 1.763s.278-.588 1.11-1.766a4.17 4.17 0 013.679-1.938z" fill="none"/></svg>
        <svg viewBox="0 0 24 24"><path d="M20.656 17.008a9.993 9.993 0 10-5.7 5.7L21 24l-1.344-6.992z" fill="none"/></svg>
        <svg viewBox="0 0 24 24"><path d="M22 3L9.218 10.083M11.698 20.334L22 3.001H2l9.218 7.083m.48 10.25l1.674-7.542m-1.674 7.542L9.218 10.083" fill="none"/></svg>
        <div class="sp"></div>
        <svg viewBox="0 0 24 24"><path d="M20 21l-8-5.5L4 21V5a2 2 0 012-2h12a2 2 0 012 2v16z" fill="none"/></svg>
      </div>
      <div class="likes">${s.lk} likes</div>
      <div class="caption">${s.cap}</div>
    </div>
    ${i<N-1?'<div class="post-divider"></div>':''}
  `).join('');
}

// Intersection observer
const obs=new IntersectionObserver(es=>{
  es.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('visible');
      const i=+e.target.dataset.idx;
      document.getElementById('counter').textContent=`${i+1} / ${N}`;
      document.getElementById('progress').style.width=((i+1)/N*100)+'%';
    }
  });
},{threshold:0.2});

function watch(){document.querySelectorAll('.post').forEach(p=>obs.observe(p))}

function lk(i){
  const svg=document.getElementById(`h${i}`);
  if(liked.has(i)){liked.delete(i);svg.classList.remove('liked','heart-pop');svg.querySelector('path').setAttribute('fill','none')}
  else{liked.add(i);svg.classList.add('liked','heart-pop');svg.querySelector('path').setAttribute('fill','')}
}

function dbl(e,i){
  if(!liked.has(i))lk(i);
  const h=document.createElement('div');
  h.className='dbl-heart';h.textContent='❤️';
  const r=e.currentTarget.getBoundingClientRect();
  h.style.left=(e.clientX-r.left-45)+'px';
  h.style.top=(e.clientY-r.top-45)+'px';
  e.currentTarget.appendChild(h);
  setTimeout(()=>h.remove(),900);
}

function toggleTheme(){
  dark=!dark;
  document.documentElement.classList.toggle('dark',dark);
  document.getElementById('ico-sun').style.display=dark?'block':'none';
  document.getElementById('ico-moon').style.display=dark?'none':'block';
}

// Pulse animation for scroll hint
const style=document.createElement('style');
style.textContent='@keyframes pulse{0%,100%{opacity:.25}50%{opacity:.5}}';
document.head.appendChild(style);

build();watch();
setTimeout(()=>document.getElementById('p0')?.classList.add('visible'),150);
</script>
</body>
</html>
